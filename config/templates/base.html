{% load static %}
<!DOCTYPE html>
<html lang="pt-BR">

<head>

    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">

    <title>{% block title %}Energy Analytics{% endblock %}</title>

    <style>
        body {
            background: #0f172a;
            color: white;
            font-family: Arial, Helvetica, sans-serif;
            margin: 0;
        }

        /* HEADER */

        .header {
            background: #020617;
            padding: 18px;
            text-align: center;
            font-size: 22px;
            font-weight: bold;
        }

        /* HERO HOME */

        .hero-home {
            position: relative;
            width: 100%;
            max-width: 1200px;
            margin: 20px auto 40px auto;

            background-image:url("{% static 'js/images/energy-hero.webp22.jpeg' %}");
            background-size: cover;
            background-position: center;

            min-height: 900px;
            padding: 80px 20px;

            border-radius: 12px;
            overflow: hidden;
        }

        .hero-home::before {
            content: "";
            position: absolute;
            inset: 0;
            background: rgba(0, 0, 0, 0.65);
            z-index: 0;
        }

        .hero-overlay {
            position: relative;
            z-index: 1;
            max-width: 900px;
            margin: auto;

            background: rgba(15, 23, 42, 0.75);
            backdrop-filter: blur(6px);

            padding: 40px;
            border-radius: 12px;
        }

        /* PAGES */

        .page-top-consumo {
            min-height: 100vh;
            position: relative;
            padding: 40px;
        }

        .page-top-consumo::before {
            content: "";
            position: absolute;
            inset: 0;

            background-image:url("{% static 'js/images/energy-hero.webp.png' %}");
            background-size: cover;
            background-position: center;
            background-repeat: no-repeat;

            filter: brightness(0.35);
            z-index: -1;
        }

        .page-anomalias {
            min-height: 100vh;
            position: relative;
            padding: 40px;
        }

        .page-anomalias::before {
            content: "";
            position: absolute;
            inset: 0;

            background-image:url("{% static 'js/images/energy-hero.webp3.png' %}");
            background-size: cover;
            background-position: center;

            filter: brightness(0.35);
            z-index: -1;
        }

        /* MENU */

        .menu {
            display: flex;
            flex-wrap: wrap;
            justify-content: center;
            gap: 10px;
            padding: 15px;
            background: #020617;
        }

        .menu a {
            text-decoration: none;
            color: white;
            background: #3b82f6;
            padding: 12px 18px;
            border-radius: 6px;
            font-size: 15px;
            transition: 0.2s;
        }

        .menu a:hover {
            background: #2563eb;
        }

        /* CONTAINER */

        .container {
            width: 95%;
            max-width: 1200px;
            margin: 40px auto;
        }

        /* CARDS */

        .card {
            background: rgba(15, 23, 42, 0.85);
            backdrop-filter: blur(6px);
            border-radius: 12px;
            padding: 25px;
        }

        /* FORM */

        input {
            width: 100%;
            padding: 12px;
            margin: 8px 0;
            border-radius: 6px;
            border: none;
        }

        button {
            width: 100%;
            padding: 12px;
            border-radius: 6px;
            border: none;
            background: #38bdf8;
            font-weight: bold;
            cursor: pointer;
        }

        button:hover {
            background: #0ea5e9;
        }

        canvas {
            width: 100%;
            max-width: 600px;
            margin: auto;
        }

        /* RESPONSIVO MOBILE */

        @media(max-width:768px) {

            .hero-home {
                min-height: 600px;
                padding: 50px 15px;
            }

            .hero-overlay {
                width: 95%;
                padding: 25px;
            }

            .hero-overlay h1 {
                font-size: 26px;
            }

            .hero-overlay p {
                font-size: 16px;
            }

            .hero-overlay ul {
                font-size: 16px;
            }

            .container {
                width: 95%;
                margin: 20px auto;
            }

            .menu {
                flex-direction: column;
                align-items: center;
            }

            .menu a {
                width: 90%;
                text-align: center;
            }

        }
    </style>

</head>

<body>

    <div class="header">
        ⚡ Energy Analytics
    </div>

    <div class="menu">

        <a href="/">Home</a>
        <a href="/dashboard/">Dashboard</a>
        <a href="/clientes-view/">Clientes</a>
        <a href="/analytics/">Analytics</a>
        <a href="/consumo/">Consumo</a>
        <a href="/top-consumidores/">Top Consumo</a>
        <a href="/anomalias/">Anomalias</a>

    </div>

    <div class="container">

        {% block content %}
        {% endblock %}

    </div>

</body>

</html>
