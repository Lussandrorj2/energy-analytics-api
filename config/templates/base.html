{% load static %}
<!DOCTYPE html>
<html lang="pt-BR">

<head>

    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">

    <title>{% block title %}Energy Analytics{% endblock %}</title>

    <style>
        /* BASE */

        body {
            background: #0f172a;
            color: white;
            font-family: Arial, Helvetica, sans-serif;
            margin: 0;
        }

        /* HEADER */

        .header {
            background: #020617;
            padding: 15px;
            text-align: center;
            font-size: 20px;
            font-weight: bold;
        }

        /* MENU */

        .menu {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 8px;
            padding: 10px;
            background: #020617;
        }

        .menu a {
            text-decoration: none;
            color: white;
            background: #3b82f6;
            padding: 10px;
            border-radius: 6px;
            font-size: 14px;
            text-align: center;
            transition: 0.2s;
        }

        .menu a:hover {
            background: #2563eb;
        }

        /* CONTAINER */

        .container {
            width: 95%;
            margin: 20px auto;
        }

        /* HERO */

        .hero-home {
            position: relative;
            width: 100%;
            margin: 20px auto;

            background-image:url("{% static 'js/images/energy-hero.webp22.jpeg' %}");
            background-size: cover;
            background-position: center;

            min-height: 320px;
            padding: 30px 15px;

            border-radius: 12px;
            overflow: hidden;
        }

        .hero-home::before {
            content: "";
            position: absolute;
            inset: 0;
            background: rgba(0, 0, 0, 0.65);
        }

        .hero-overlay {
            position: relative;
            max-width: 900px;
            margin: auto;

            background: rgba(15, 23, 42, 0.75);
            backdrop-filter: blur(6px);

            padding: 25px;
            border-radius: 12px;
        }

        /* CARDS */

        .card {
            background: rgba(15, 23, 42, 0.85);
            backdrop-filter: blur(6px);
            border-radius: 12px;
            padding: 20px;
            margin-bottom: 20px;
        }

        /* FORM */

        input {
            width: 100%;
            padding: 12px;
            margin: 8px 0;
            border-radius: 6px;
            border: none;
        }

        button {
            width: 100%;
            padding: 12px;
            border-radius: 6px;
            border: none;
            background: #38bdf8;
            font-weight: bold;
            cursor: pointer;
        }

        button:hover {
            background: #0ea5e9;
        }

        /* GRÁFICOS */

        canvas {
            width: 100% !important;
            min-height: 250px;
        }

        /* PAGES */

        .page-top-consumo,
        .page-anomalias {
            min-height: 100vh;
            padding: 20px 0;
        }

        /* TITULOS */

        h1 {
            font-size: 24px;
        }

        h2 {
            font-size: 18px;
        }

        /* ===== DESKTOP ===== */

        @media(min-width:768px) {

            .header {
                font-size: 22px;
                padding: 18px;
            }

            .menu {
                display: flex;
                flex-wrap: wrap;
                justify-content: center;
                gap: 10px;
                padding: 15px;
            }

            .menu a {
                padding: 12px 18px;
                font-size: 15px;
            }

            .container {
                max-width: 1200px;
                margin: 40px auto;
            }

            .hero-home {
                min-height: 500px;
                padding: 60px 20px;
            }

            .hero-overlay {
                padding: 40px;
            }

            canvas {
                min-height: 350px;
            }

            h1 {
                font-size: 32px;
            }

            h2 {
                font-size: 24px;
            }

        }
    </style>

</head>

<body>

    <div class="header">
        ⚡ Energy Analytics
    </div>

    <div class="menu">

        <a href="/">Home</a>
        <a href="/dashboard/">Dashboard</a>
        <a href="/clientes-view/">Clientes</a>
        <a href="/analytics/">Analytics</a>
        <a href="/consumo/">Consumo</a>
        <a href="/top-consumidores/">Top Consumo</a>
        <a href="/anomalias/">Anomalias</a>
        <a href="/register/">Criar Usuário</a>

    </div>

    <div class="container">

        {% block content %}
        {% endblock %}

    </div>

</body>

</html>
