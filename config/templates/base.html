{% load static %}
<!DOCTYPE html>
<html>

<head>

    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="{% static 'css/base.css' %}">

    <title>{% block title %}Energy Analytics{% endblock %}</title>

    <style>
        body {
            background: #0f172a;
            color: white;
            font-family: Arial;
            margin: 0;
        }

        .header {
            background: #020617;
            padding: 15px;
            text-align: center;
            font-size: 22px;
            font-weight: bold;
        }

        .hero-home {
            position: relative;
            text-align: center;
            margin-top: 30px;
        }

        .hero-home img {
            width: 100%;
            border-radius: 12px;
            filter: brightness(0.55);
        }

        .hero-text {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            width: 80%;
            max-width: 900px;
            color: white;
        }

        .hero-text h1 {
            font-size: 48px;
            margin-bottom: 20px;
        }

        .hero-text .card {
            background: rgba(15, 23, 42, 0.85);
            backdrop-filter: blur(6px);
            padding: 25px;
            border-radius: 12px;
            text-align: left;
        }

        .page-top-consumo {
            min-height: 100vh;
            position: relative;
            padding: 40px;
        }

        .page-top-consumo::before {
            content: "";
            position: absolute;
            inset: 0;

            background-image: url("{% static 'js/images/energy-hero.webp.png' %}");
            background-size: cover;
            background-position: center;
            background-repeat: no-repeat;

            filter: brightness(0.35);

            z-index: -1;
        }

        .page-anomalias {
            min-height: 100vh;
            position: relative;
            padding: 40px;
        }

        .page-anomalias::before {
            content: "";
            position: absolute;
            inset: 0;

            background-image: url("{% static 'js/images/energy-hero.webp3.png' %}");

            background-size: cover;
            background-position: center;

            filter: brightness(0.35);

            z-index: -1;
        }

        .menu {
            display: flex;
            flex-wrap: wrap;
            justify-content: center;
            gap: 10px;
            padding: 15px;
            background: #020617;
        }

        .menu a {
            text-decoration: none;
            color: white;
            background: #3b82f6;
            padding: 10px 15px;
            border-radius: 6px;
            font-size: 14px;
        }

        .menu a:hover {
            background: #2563eb;
        }

        .container {
            width: 95%;
            max-width: 1200px;
            margin: 40px auto;
        }

        .dashboard-container {
            padding: 40px 20px;
        }

        .card {
            background: rgba(15, 23, 42, 0.85);
            backdrop-filter: blur(6px);
            border-radius: 12px;
            padding: 25px;
        }

        .hero {
            margin-top: 40px;
            text-align: center;
        }

        .hero img {
            width: 100%;
            max-width: 900px;
            border-radius: 12px;
            box-shadow: 0 10px 40px rgba(0, 0, 0, 0.6);
        }

        input {
            width: 100%;
            padding: 12px;
            margin: 8px 0;
            border-radius: 6px;
            border: none;
        }

        button {
            width: 100%;
            padding: 12px;
            border-radius: 6px;
            border: none;
            background: #38bdf8;
            font-weight: bold;
            cursor: pointer;
        }

        button:hover {
            background: #0ea5e9;
        }

        canvas {
            width: 100%;
            max-width: 600px;
            margin: auto;
        }
    </style>

</head>

<body>

    <div class="header">
        ⚡ Energy Analytics
    </div>

    <div class="menu">

        <a href="/">Home</a>
        <a href="/dashboard/">Dashboard</a>
        <a href="/clientes-view/">Clientes</a>
        <a href="/analytics/">Analytics</a>
        <a href="/consumo/">Consumo</a>
        <a href="/top-consumidores/">Top Consumo</a>
        <a href="/anomalias/">Anomalias</a>

    </div>

    <div class="container">

        {% block content %}
        {% endblock %}

    </div>

</body>

</html>
