{% extends "base.html" %}

{% block title %}
Login
{% endblock %}

{% block content %}

<h1>Login</h1>

<div class="card">

<form method="POST">

{% csrf_token %}

<input type="text" name="username" placeholder="Usuário" required>

<input type="password" name="password" placeholder="Senha" required>

<button type="submit">
Entrar
</button>

</form>

</div>

{% endblock %}
