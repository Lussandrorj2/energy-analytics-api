{% load static %}
<!DOCTYPE html>
<html>

<head>
    <title>Dashboard</title>
    <style>
        body {
            background: #0f172a;
            color: white;
            font-family: Arial;
            padding: 40px;
            text-align: center;
        }

        /* CARDS PRINCIPAIS */

        .container {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 25px;
            max-width: 1100px;
            margin: auto;
        }

        .card {
            background: #1e293b;
            padding: 30px;
            border-radius: 16px;
            box-shadow: 0 10px 25px rgba(0, 0, 0, 0.35);
        }

        .value {
            font-size: 26px;
            color: #38bdf8;
            font-weight: bold;
        }

        /* TOP CONSUMIDORES */

        .btn-ranking {
            display: inline-block;
            margin-top: 30px;
            padding: 12px 24px;
            background: #38bdf8;
            color: #0f172a;
            font-weight: bold;
            border-radius: 8px;
            text-decoration: none;
        }

        .btn {
            background: #38bdf8;
            color: white;
            border: none;
            padding: 10px 18px;
            border-radius: 8px;
            cursor: pointer;
            font-size: 14px;
            margin-right: 10px;
        }

        .btn:hover {
            background: #0284c7;
        }

        .top-container {
            display: flex;
            justify-content: center;
            gap: 20px;
            margin-top: 40px;
            flex-wrap: wrap;
        }

        .top-card {
            background: #1e293b;
            padding: 20px;
            width: 200px;
            border-radius: 14px;
            box-shadow: 0 10px 25px rgba(0, 0, 0, 0.35);
        }

        .rank {
            font-size: 22px;
        }

        .nome {
            margin-top: 10px;
        }

        .consumo {
            color: #38bdf8;
            margin-top: 5px;
        }

        /* GRAFICO */

        .secao-grafico {
            margin-top: 60px;
        }

        .grafico-wrapper {
            width: 80%;
            max-width: 900px;
            height: 400px;
            margin: auto;
        }
    </style>
</head>

<body>

    <h1>📊 Dashboard Energy Analytics</h1>

    <div class="container">
        <div class="card">
            <h2>Total Clientes</h2>
            <div class="value" id="totalClientes">...</div>
        </div>

        <div class="card">
            <h2>Consumo Total</h2>
            <div class="value" id="totalConsumo">...</div>
        </div>

        <div class="card">
            <h2>Média Geral</h2>
            <div class="value" id="mediaGeral">...</div>
        </div>

        <div class="card">
            <h2>Crescimento Último Mês</h2>
            <div class="value" id="crescimentoPercentual">...</div>
        </div>
        <a href="/top-consumidores/" class="btn-ranking">
            Ver Top Consumidores
        </a>
        <a href="/anomalias/">
            <button class="btn">🚨 Ver Anomalias</button>
        </a>
    </div>

    <div class="secao-grafico">
        <h2>Consumo por Cliente</h2>

        <select id="clienteSelect">
            <option value="geral">Todos clientes</option>
        </select>

        <div class="grafico-wrapper">
            <canvas id="graficoConsumo"></canvas>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script src="{% static 'js/dashboard.js' %}"></script>
</body>

</html>
