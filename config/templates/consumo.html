<!DOCTYPE html>
<html>

<head>
    <title>Dashboard</title>
    <style>
        body {
            background: #0f172a;
            color: white;
            font-family: Arial;
            text-align: center;
            padding: 60px;
        }

        .card {
            background: #1e293b;
            padding: 30px;
            border-radius: 15px;
            margin: 20px auto;
            width: 300px;
        }

        input,
        button {
            margin: 5px;
            padding: 8px;
            border-radius: 6px;
            border: none;
        }

        button {
            background: #3b82f6;
            color: white;
            cursor: pointer;
        }

        button:hover {
            background: #2563eb;
        }
    </style>
</head>

<body>

    <h1> ⚡Consumo ⚡ </h1>

    <form id="consumoForm">
        <select id="clienteSelect" required>
            <option value="">Selecione um cliente</option>
        </select>

        <input type="date" id="mes" required>
        <input type="number" id="consumo" placeholder="Consumo kWh" required>
        <button type="submit">Cadastrar Consumo</button>
    </form>

    <script>

        const token = localStorage.getItem("access_token");

        // 🔹 Carregar clientes no select
        fetch("/api/v1/clientes/", {
            headers: {
                "Authorization": "Bearer " + token
            }
        })
            .then(res => res.json())
            .then(data => {
                const select = document.getElementById("clienteSelect");

                data.forEach(cliente => {
                    const option = document.createElement("option");
                    option.value = cliente.id;
                    option.textContent = cliente.nome;
                    select.appendChild(option);
                });
            });

        // 🔹 Cadastrar consumo
        document.getElementById("consumoForm").addEventListener("submit", async (e) => {
            e.preventDefault();

            const cliente = document.getElementById("clienteSelect").value;
            const mes = document.getElementById("mes").value;
            const consumo_kwh = document.getElementById("consumo").value;

            try {
                const response = await fetch("/api/v1/consumos/", {
                    method: "POST",
                    headers: {
                        "Content-Type": "application/json",
                        "Authorization": "Bearer " + token
                    },
                    body: JSON.stringify({
                        cliente: parseInt(cliente),
                        mes,
                        consumo_kwh: parseFloat(consumo_kwh)
                    })
                });

                if (response.ok) {
                    alert("✅ Consumo cadastrado com sucesso!");
                    document.getElementById("consumoForm").reset();
                } else {
                    const erro = await response.json();
                    console.log(erro);
                    alert("❌ Erro ao cadastrar consumo");
                }

            } catch (error) {
                console.error(error);
                alert("Erro na requisição");
            }
        });

        // 🔹 Health check
        fetch("/health/")
            .then(res => res.json())
            .then(data => {
                document.getElementById("status").innerText = data.status.toUpperCase();
            });

    </script>

</body>

</html>
