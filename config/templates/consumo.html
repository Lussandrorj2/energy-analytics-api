{% extends "base.html" %}

{% block title %}
Consumo
{% endblock %}

{% block content %}

<h1>⚡ Registrar Consumo</h1>

<div class="card">

<form method="POST">

{% csrf_token %}

<input type="number" name="cliente_id" placeholder="ID do Cliente" required>

<input type="month" name="mes" required>

<input type="number" name="consumo_kwh" placeholder="Consumo kWh" required>

<button type="submit">
Registrar
</button>

</form>

</div>

{% endblock %}
